<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Omamori 🎋</title>
  <style>
    @font-face { font-family: "CutiePatootie"; src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "Wildcrazy";     src: url("../fonts/Wildcrazy-WKYO.ttf")     format("truetype"); font-display: swap; }
    @font-face { font-family: "Cookiemonster"; src: url("../fonts/Cookiemonster-gv11.ttf") format("truetype"); font-display: swap; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #fff8f0;
      --bg-2:   #f0f8ff;
      --ink:    #2a1a0e;
      --red:    #c0392b;
      --gold:   #c9a84c;
      --cream:  #fdf5e6;
    }

    html, body, body * {
      font-family: "Wildcrazy", "Segoe UI Emoji", sans-serif !important;
    }

    body {
      color: var(--ink);
      background: linear-gradient(140deg, var(--bg), var(--bg-2));
      min-height: 100vh;
      padding: 24px 16px 100px;
      overflow-x: hidden;
    }

    .bg-sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .bg-sparkles span {
      position: absolute; width: var(--size); height: var(--size);
      border-radius: 999px; background: rgba(201,168,76,0.3);
      opacity: 0.5; filter: blur(0.5px);
      animation: floatS 10s ease-in-out infinite;
    }
    @keyframes floatS {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-14px) scale(1.06); }
    }

    .page {
      position: relative; z-index: 2;
      max-width: 700px; margin: 0 auto;
      display: flex; flex-direction: column;
      align-items: center; gap: 22px;
    }

    header { text-align: center; }
    header h1 {
      font-family: "CutiePatootie", cursive !important;
      font-size: clamp(2rem, 6vw, 3.4rem);
      color: var(--red);
    }
    header p { margin-top: 8px; font-size: clamp(1rem, 2.5vw, 1.2rem); opacity: 0.75; }

    /* ── SHRINE AREA ── */
    .shrine {
      width: min(500px, 92vw);
      background: linear-gradient(160deg, rgba(253,245,230,0.95), rgba(255,255,255,0.9));
      border-radius: 28px;
      padding: clamp(24px,4vw,40px);
      box-shadow: 0 20px 50px rgba(180,100,80,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(201,168,76,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .shrine-decoration {
      font-size: clamp(2rem, 6vw, 3rem);
      letter-spacing: 0.5em;
      opacity: 0.7;
    }

    /* ── OMAMORI CHARM ── */
    .omamori-wrap {
      position: relative;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .omamori-wrap:hover { transform: translateY(-8px) rotate(2deg); }
    .omamori-wrap.shaking { animation: shake 0.5s ease-in-out; }
    @keyframes shake {
      0%,100% { transform: rotate(0deg); }
      20%      { transform: rotate(-8deg) scale(1.05); }
      40%      { transform: rotate(8deg) scale(1.05); }
      60%      { transform: rotate(-5deg); }
      80%      { transform: rotate(5deg); }
    }

    .omamori {
      width: clamp(100px, 25vw, 140px);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* tassel at top */
    .omamori-tassel {
      width: 4px;
      height: clamp(30px, 6vw, 44px);
      background: linear-gradient(180deg, var(--gold), #a07830);
      border-radius: 2px;
      margin-bottom: -2px;
      position: relative;
    }
    .omamori-tassel::before {
      content: "";
      position: absolute; bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 12px;
      background: var(--gold);
      border-radius: 50%;
    }

    /* main charm body */
    .omamori-body {
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(160deg, var(--red), #8b1a1a);
      border-radius: 8px 8px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      box-shadow:
        0 12px 28px rgba(150,30,30,0.35),
        inset 0 1px 0 rgba(255,180,180,0.2),
        inset 0 -2px 0 rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }
    .omamori-body::before {
      content: "";
      position: absolute; inset: 6px;
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 4px 4px 10px 10px;
    }
    .omamori-kanji {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      color: var(--gold);
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 1;
      line-height: 1;
    }
    .omamori-label {
      font-size: clamp(0.6rem, 1.8vw, 0.78rem);
      color: rgba(255,215,0,0.8);
      z-index: 1;
      letter-spacing: 0.08em;
    }

    /* fringe at bottom */
    .omamori-fringe {
      display: flex; gap: 3px;
      margin-top: -2px;
    }
    .omamori-fringe span {
      width: 4px;
      height: clamp(16px, 4vw, 22px);
      background: linear-gradient(180deg, var(--gold), #a07830);
      border-radius: 0 0 2px 2px;
    }

    .shake-hint {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      opacity: 0.6;
    }

    /* ── FORTUNE RESULT ── */
    .fortune-result {
      width: 100%;
      background: rgba(253,245,230,0.95);
      border-radius: 16px;
      padding: clamp(16px,3vw,26px);
      border: 1px solid rgba(201,168,76,0.4);
      box-shadow: 0 8px 20px rgba(180,100,80,0.1);
      opacity: 0;
      transform: translateY(14px) scale(0.97);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1);
      pointer-events: none;
    }
    .fortune-result.show {
      opacity: 1; transform: translateY(0) scale(1); pointer-events: all;
    }
    .fortune-result h3 {
      font-family: "CutiePatootie", cursive !important;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: var(--red);
      margin-bottom: 8px;
    }
    .fortune-result p {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 1.7;
      color: var(--ink);
    }
    .fortune-result .fortune-note {
      margin-top: 10px;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--gold);
      font-style: italic;
    }

    .new-charm-btn {
      border: none; border-radius: 999px;
      padding: clamp(10px,2vw,14px) clamp(22px,5vw,38px);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      cursor: pointer;
      background: linear-gradient(135deg, #c0392b, #96281b);
      color: #fdf5e6;
      box-shadow: 0 10px 24px rgba(150,40,30,0.3);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      display: none;
    }
    .new-charm-btn.show { display: inline-block; }
    .new-charm-btn:hover { transform: translateY(-3px) scale(1.05); }

    .back-btn {
      position: fixed; left: 20px; bottom: 20px; z-index: 30;
      border: none; border-radius: 999px; padding: 14px 28px;
      font-size: clamp(1.1rem,2.5vw,1.4rem); cursor: pointer;
      background: rgba(255,255,255,0.86); color: #2a1a0e;
      box-shadow: 0 8px 22px rgba(0,0,0,0.2);
      transition: transform 220ms ease;
    }
    .back-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="bg-sparkles" aria-hidden="true">
    <span style="--size:10px;left:8%;top:12%"></span>
    <span style="--size:16px;left:18%;top:24%"></span>
    <span style="--size:12px;left:32%;top:10%"></span>
    <span style="--size:14px;left:44%;top:22%"></span>
    <span style="--size:9px;left:56%;top:14%"></span>
    <span style="--size:13px;left:66%;top:30%"></span>
    <span style="--size:11px;left:78%;top:16%"></span>
    <span style="--size:15px;left:88%;top:28%"></span>
  </div>

  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">
    Go Back
  </button>

  <div class="page">
    <header>
      <h1>Fortune Omamori 🎋</h1>
      <p>A lucky charm from the shrine, just for you.</p>
    </header>

    <div class="shrine">
      <div class="shrine-decoration">⛩️ 🌸 ⛩️</div>

      <div class="omamori-wrap" id="omamoriWrap" onclick="drawFortune()">
        <div class="omamori">
          <div class="omamori-tassel"></div>
          <div class="omamori-body">
            <div class="omamori-kanji" id="omamoriKanji">御守</div>
            <div class="omamori-label">OMAMORI</div>
          </div>
          <div class="omamori-fringe">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <p class="shake-hint" id="shakeHint">Tap the charm to receive your blessing 🙏</p>

      <div class="fortune-result" id="fortuneResult">
        <h3 id="fortuneName"></h3>
        <p id="fortuneMsg"></p>
        <p class="fortune-note" id="fortuneNote"></p>
      </div>

      <button class="new-charm-btn" id="newCharmBtn" onclick="resetCharm()">New Charm 🎋</button>
    </div>
  </div>

  <script>
    const fortunes = [
      { kanji:"愛", name:"Love & Warmth 💕", msg:"The universe has wrapped a blanket of love around you today. Someone near you holds you dearer than you know.", note:"Carry this warmth wherever you go today. 🌸" },
      { kanji:"福", name:"Great Fortune 🌟", msg:"Abundance is flowing toward you. Small joys and unexpected gifts are hiding in the corners of your day — look for them.", note:"Fortune favors those who smile first. ✨" },
      { kanji:"健", name:"Radiant Health 🌿", msg:"Your energy is strong. Take care of your beautiful self today — rest, nourish, breathe. You deserve to feel amazing.", note:"One deep breath. You've got this. 💚" },
      { kanji:"縁", name:"Destined Connection 🔗", msg:"A bond in your life is fated and strong. The person who holds your heart is not there by chance — it was always meant to be.", note:"Some connections are written in the stars. 💫" },
      { kanji:"幸", name:"Pure Happiness 🌈", msg:"Joy is not coming — it is already here, hiding in the ordinary. Today, let yourself be happy for no reason at all.", note:"You deserve happiness just for being you. 🌺" },
      { kanji:"運", name:"Lucky Winds 🍃", msg:"Something you've been hoping for is quietly turning in your favour. Keep going — luck is on your side this season.", note:"Good things take time, but they do come. 🍀" },
      { kanji:"夢", name:"Beautiful Dreams 🌙", msg:"Your dreams are not silly. They are signals. The things you want deeply are the things you are meant to have.", note:"Dream big, darling. The universe is listening. 🌙" },
      { kanji:"平", name:"Inner Peace ☁️", msg:"You are allowed to let go of what is heavy. Peace is your birthright. Rest in the knowledge that you are safe and loved.", note:"Let go of what isn't yours to carry. 🕊️" },
      { kanji:"勝", name:"Victory is Yours ⚡", msg:"You are stronger than you think. Whatever challenge stands before you — you have already survived harder. You will win.", note:"Believe in yourself like I believe in you. 💪" },
      { kanji:"心", name:"Pure Heart 💖", msg:"Your heart is good and pure and rare. The way you love and care for people is one of the most beautiful things about you.", note:"A pure heart always finds its way home. 💖" },
    ];

    let used = false;

    function drawFortune() {
      if (used) return;
      used = true;

      const wrap = document.getElementById("omamoriWrap");
      wrap.classList.add("shaking");

      const fortune = fortunes[Math.floor(Math.random() * fortunes.length)];

      setTimeout(() => {
        wrap.classList.remove("shaking");
        document.getElementById("omamoriKanji").textContent = fortune.kanji;
        document.getElementById("fortuneName").textContent  = fortune.name;
        document.getElementById("fortuneMsg").textContent   = fortune.msg;
        document.getElementById("fortuneNote").textContent  = fortune.note;
        document.getElementById("fortuneResult").classList.add("show");
        document.getElementById("newCharmBtn").classList.add("show");
        document.getElementById("shakeHint").textContent = "Your blessing has been received 🙏";
      }, 600);
    }

    function resetCharm() {
      used = false;
      document.getElementById("omamoriKanji").textContent = "御守";
      document.getElementById("fortuneResult").classList.remove("show");
      document.getElementById("newCharmBtn").classList.remove("show");
      document.getElementById("shakeHint").textContent = "Tap the charm to receive your blessing 🙏";
    }
  </script>
</body>
</html>
