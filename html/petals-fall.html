<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Petal Shower</title>
  <style>
    @font-face { font-family: "CutiePatootie"; src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "Wildcrazy"; src: url("../fonts/Wildcrazy-WKYO.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "Cookiemonster"; src: url("../fonts/Cookiemonster-gv11.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "BalonkuRegular"; src: url("../fonts/BalonkuRegular-la1w.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "GamepauseddemoRegular"; src: url("../fonts/GamepauseddemoRegular-RpmY6.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "LoveAndTrust"; src: url("../fonts/LoveAndTrust-lqdy.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveAndTrustHearted"; src: url("../fonts/LoveAndTrustHearted-naLP.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveArrow"; src: url("../fonts/LoveArrow-JpRgj.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "LoveBubbles"; src: url("../fonts/LoveBubbles-MV21J.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveDays"; src: url("../fonts/LoveDays-2v7Oe.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveDisplayPersonalUse"; src: url("../fonts/LoveDisplayPersonalUse-6RL2x.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "LoveLili"; src: url("../fonts/LoveLili-LVKvG.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "LoveMaulidah"; src: url("../fonts/LoveMaulidah-KVAoA.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "LoveMint"; src: url("../fonts/LoveMint-9497.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveMintAlt"; src: url("../fonts/LoveMint-y6Gq.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "LoveRain"; src: url("../fonts/LoveRain-vnm9M.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveSky"; src: url("../fonts/LoveSky-6R75v.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveStory"; src: url("../fonts/LoveStory-mLZgv.otf") format("opentype"); font-display: swap; }
    @font-face { font-family: "LoveVale"; src: url("../fonts/LoveVale-BWm1G.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "StarShieldV2"; src: url("../fonts/StarShieldV2-9M52K.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "TheHeartOfEverythingDemo"; src: url("../fonts/TheHeartOfEverythingDemo-KRdD.ttf") format("truetype"); font-display: swap; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; 
      font-family: "LoveSky", sans-serif;
    }

    body {
      font-family: "LoveSky", sans-serif;
      background: radial-gradient(circle at 20% 20%, #fff5fb, #eef6ff 45%, #f6f2ff 70%, #fff7e6 100%);
      overflow: hidden;
    }

    .center-text {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      z-index: 6;
      pointer-events: none;
      color: #2b1c26;
      font-size: clamp(1.6rem, 4.2vw, 3.2rem);
    }

    .back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 10;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "CutiePatootie", cursive;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }

    .petal-zone {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .petal {
      position: absolute;
      width: var(--size, 18px);
      height: calc(var(--size, 18px) * 0.7);
      background: var(--color, #ffc6de);
      border-radius: 60% 40% 60% 40%;
      opacity: 0.9;
      filter: blur(0.2px);
      transform-origin: center;
      animation: fall var(--dur, 6s) linear forwards,
                 sway var(--sway, 4s) ease-in-out infinite;
    }

    .petal::before {
      content: "";
      position: absolute;
      width: 60%;
      height: 60%;
      left: 20%;
      top: 10%;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      transform: rotate(-20deg);
    }

    @keyframes fall {
      from { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      to { transform: translateY(110vh) rotate(var(--rot, 360deg)); opacity: 0; }
    }

    @keyframes sway {
      0% { margin-left: 0; }
      50% { margin-left: var(--drift, 40px); }
      100% { margin-left: 0; }
    }
  </style>
  <script defer src="../js/site-runtime.js?v=20260331-runtime13"></script>
</head>
<body>
  <div class="petal-zone" id="petalZone"></div>
  <div class="center-text"><span id="loveText">I love you forever and ever</span></div>
  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">Go Back</button>

  <script>
    const zone = document.getElementById("petalZone");
    const loveText = document.getElementById("loveText");

    const colors = ["#ffd0e6", "#ffc6de", "#e6d6ff", "#cfe2ff", "#f4d6ff", "#ffe2f1", "#d7e8ff"];

    const patterns = [
      { sway: 4.2, drift: 30, min: 4, max: 7, size: [14, 22], rot: 240 },
      { sway: 5.0, drift: 60, min: 5, max: 8, size: [12, 20], rot: 320 },
      { sway: 3.6, drift: 20, min: 4, max: 7, size: [16, 26], rot: 200 },
      { sway: 6.2, drift: 70, min: 5, max: 9, size: [10, 18], rot: 400 },
      { sway: 4.8, drift: 40, min: 4, max: 8, size: [14, 24], rot: 280 },
      { sway: 7.0, drift: 80, min: 6, max: 10, size: [12, 22], rot: 420 },
      { sway: 5.6, drift: 55, min: 5, max: 9, size: [13, 23], rot: 360 },
      { sway: 3.9, drift: 25, min: 4, max: 7, size: [15, 26], rot: 260 },
      { sway: 6.5, drift: 75, min: 6, max: 10, size: [11, 20], rot: 450 },
      { sway: 4.4, drift: 35, min: 4, max: 8, size: [16, 24], rot: 300 },
    ];

    function spawnPetal() {
      const p = document.createElement("div");
      p.className = "petal";
      const pattern = patterns[Math.floor(Math.random() * patterns.length)];
      const size = Math.random() * (pattern.size[1] - pattern.size[0]) + pattern.size[0];
      const duration = Math.random() * (pattern.max - pattern.min) + pattern.min;
      const drift = (Math.random() * pattern.drift) * (Math.random() > 0.5 ? 1 : -1);
      const rot = (Math.random() * pattern.rot + 180) * (Math.random() > 0.5 ? 1 : -1);

      p.style.left = `${Math.random() * 100}vw`;
      p.style.setProperty("--size", `${size}px`);
      p.style.setProperty("--dur", `${duration}s`);
      p.style.setProperty("--sway", `${pattern.sway}s`);
      p.style.setProperty("--drift", `${drift}px`);
      p.style.setProperty("--rot", `${rot}deg`);
      p.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);

      zone.appendChild(p);
      p.addEventListener("animationend", () => p.remove());
    }

    // dense petals
    setInterval(spawnPetal, 90);

    const fontStack = [
      "CutiePatootie",
      "Wildcrazy",
      "Cookiemonster",
      "BalonkuRegular",
      "GamepauseddemoRegular",
      "LoveAndTrust",
      "LoveAndTrustHearted",
      "LoveArrow",
      "LoveBubbles",
      "LoveDays",
      "LoveDisplayPersonalUse",
      "LoveLili",
      "LoveMaulidah",
      "LoveMint",
      "LoveMintAlt",
      "LoveRain",
      "LoveSky",
      "LoveStory",
      "LoveVale",
      "StarShieldV2",
      "TheHeartOfEverythingDemo"
    ];

    let fontIndex = 0;
    setInterval(() => {
      fontIndex = (fontIndex + 1) % fontStack.length;
      loveText.style.fontFamily = fontStack[fontIndex];
    }, 200);
  </script>
</body>
</html>
