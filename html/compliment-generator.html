      overflow: hidden;
      color: #111;

      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .center-text {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      font-family: "Cookiemonster", sans-serif;
      font-size: clamp(1.8rem, 4.6vw, 3.4rem);

      left: 20px;
      bottom: 20px;
      z-index: 5;
      border: none;
      border-radius: 999px;

      font-family: "CutiePatootie", cursive;

      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);

      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);

    .generate-btn:hover {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
