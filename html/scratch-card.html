<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Scratch for a Secret</title>
  <style>
    @font-face { font-family: "CutiePatootie"; src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "LoveArrow";     src: url("../fonts/LoveArrow-JpRgj.otf")    format("opentype"); font-display: swap; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #fdf6ff;
      --bg-2:     #f3fbff;
      --ink:      #2a2a3b;
      --accent:   #e2b7ff;
      --accent-2: #bfe1ff;
    }

    html, body, body * {
      font-family: "LoveArrow", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif !important;
    }

    body {
      color: var(--ink);
      background: linear-gradient(140deg, var(--bg), var(--bg-2));
      min-height: 100vh;
      padding: 24px 16px 100px;
      overflow-x: hidden;
    }

    .bg-sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .bg-sparkles span {
      position: absolute;
      width: var(--size); height: var(--size);
      border-radius: 999px;
      background: var(--accent-2);
      opacity: 0.45; filter: blur(0.2px);
      animation: floatS 10s ease-in-out infinite;
    }
    @keyframes floatS {
      0%   { transform: translateY(0) translateX(0) scale(1); }
      50%  { transform: translateY(-16px) translateX(10px) scale(1.06); }
      100% { transform: translateY(0) translateX(0) scale(1); }
    }

    header {
      text-align: center;
      margin: 12px auto 22px;
      max-width: 900px;
      position: relative; z-index: 2;
    }
    header h1 { font-size: clamp(2.8rem, 7vw, 4.2rem); }
    header p  { margin-top: 8px; font-size: clamp(1.3rem, 3.5vw, 1.7rem); opacity: 0.8; }

    .panel {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 28px;
      border-radius: 26px;
      background-image: url("https://images.unsplash.com/photo-1762227144580-431ec0015003?auto=format&fit=crop&fm=jpg&q=80&w=2000");
      background-size: cover;
      background-position: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.12);
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      position: relative;
      overflow: hidden;
      z-index: 2;
    }
    .panel::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(150deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
      z-index: 0;
    }
    .panel > * { position: relative; z-index: 1; }

    .scratch-wrap {
      position: relative;
      width: min(700px, 88vw);
      height: clamp(280px, 48vw, 440px);
      border-radius: 22px;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .scratch-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: transparent;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.6;
      text-align: center;
      color: var(--ink);
      z-index: 0;
      transition: font-size 0.4s ease;
    }
    .scratch-message.big {
      font-size: clamp(2.6rem, 7.5vw, 4rem);
    }

    #scratchCanvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
      z-index: 1;
      border-radius: 22px;
      touch-action: none;
    }

    .scratch-hint {
      position: absolute;
      bottom: 14px; left: 0; right: 0;
      text-align: center;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: rgba(80,80,80,0.55);
      z-index: 2;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    .try-btn {
      border: none;
      border-radius: 999px;
      padding: clamp(12px,2vw,16px) clamp(30px,6vw,52px);
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      cursor: pointer;
      background: linear-gradient(135deg, #e2b7ff, #bfe1ff);
      color: #2a2a3b;
      box-shadow: 0 10px 28px rgba(200,150,255,0.3);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(0.9);
    }
    .try-btn.show {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0) scale(1);
    }
    .try-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 16px 36px rgba(200,150,255,0.4); }
    .try-btn:active { transform: scale(0.97); }

    .back-btn {
      position: fixed;
      left: 20px; bottom: 20px; z-index: 30;
      border: none; border-radius: 999px;
      padding: 14px 28px;
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      cursor: pointer;
      background: rgba(255,255,255,0.92);
      color: #2a2a3b;
      box-shadow: 0 8px 22px rgba(0,0,0,0.2);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(0,0,0,0.25); }

    @media (max-width: 700px) {
      .panel { min-height: 75vh; padding: 18px; }
    }
  </style>
  <script defer src="../js/site-runtime.js?v=20260331-runtime13"></script>
</head>
<body>

  <div class="bg-sparkles" aria-hidden="true">
    <span style="--size:12px;left:8%;top:12%"></span>
    <span style="--size:19px;left:18%;top:24%"></span>
    <span style="--size:14px;left:32%;top:10%"></span>
    <span style="--size:17px;left:44%;top:22%"></span>
    <span style="--size:11px;left:56%;top:14%"></span>
    <span style="--size:16px;left:66%;top:30%"></span>
    <span style="--size:13px;left:78%;top:16%"></span>
    <span style="--size:18px;left:88%;top:28%"></span>
    <span style="--size:11px;left:12%;top:70%"></span>
    <span style="--size:14px;left:36%;top:78%"></span>
    <span style="--size:17px;left:64%;top:74%"></span>
    <span style="--size:12px;left:84%;top:68%"></span>
  </div>

  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">
    Go Back
  </button>

  <header>
    <h1>Scratch for a Secret</h1>
    <p>Scratch away to reveal a tiny love note underneath 🥹 </p>
  </header>

  <section class="panel">

    <div class="scratch-wrap" id="scratchWrap">
      <div class="scratch-message" id="scratchMsg">
        You is a bich, hehe 🤭
      </div>
      <canvas id="scratchCanvas"></canvas>
      <div class="scratch-hint" id="scratchHint">✦ scratch here ✦</div>
    </div>

    <button class="try-btn" id="tryBtn">Try me again</button>

  </section>

  <script>
    const canvas  = document.getElementById("scratchCanvas");
    const ctx     = canvas.getContext("2d");
    const hint    = document.getElementById("scratchHint");
    const tryBtn  = document.getElementById("tryBtn");
    const msg     = document.getElementById("scratchMsg");

    // round 0 = first scratch, round 1 = second scratch (final, no more)
    let round            = 0;
    let scratching       = false;
    let scratchCount     = 0;
    let hintHidden       = false;
    let revealTriggered  = false;

    const SCRATCH_COLOR  = "rgba(240, 235, 248, 1)";

    function drawScratchSurface() {
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = SCRATCH_COLOR;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      drawScratchSurface();
    }

    resize();
    window.addEventListener("resize", resize);

    function scratch(x, y) {
      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.arc(x, y, 28, 0, Math.PI * 2);
      ctx.fill();
      scratchCount++;

      if (!hintHidden && scratchCount > 4) {
        hint.style.opacity = "0";
        hintHidden = true;
      }

      if (!revealTriggered && scratchCount > 80) {
        revealTriggered = true;
        onFullyScratch();
      }
    }

    function onFullyScratch() {
      msg.classList.add("big");

      if (round === 0) {
        // show try me again only after first scratch
        setTimeout(() => tryBtn.classList.add("show"), 400);
      }
      // round 1 = final message, no button shown -- already hidden
    }

    function getPos(e) {
      const rect   = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const src    = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY,
      };
    }

    canvas.addEventListener("pointerdown",  e => { scratching=true;  const p=getPos(e); scratch(p.x,p.y); });
    canvas.addEventListener("pointermove",  e => { if(scratching){ const p=getPos(e); scratch(p.x,p.y); } });
    canvas.addEventListener("pointerup",    ()  => { scratching=false; });
    canvas.addEventListener("pointerleave", ()  => { scratching=false; });
    canvas.addEventListener("touchstart",  e => { e.preventDefault(); scratching=true;  const p=getPos(e); scratch(p.x,p.y); }, { passive:false });
    canvas.addEventListener("touchmove",   e => { e.preventDefault(); if(scratching){ const p=getPos(e); scratch(p.x,p.y); } }, { passive:false });
    canvas.addEventListener("touchend",    ()  => { scratching=false; });

    tryBtn.addEventListener("click", () => {
      round = 1;

      // update message to final
      msg.textContent = "You are the love of my life bishh 💖";

      // hide try me forever
      tryBtn.classList.remove("show");
      tryBtn.style.display = "none";

      // reset scratch
      msg.classList.remove("big");
      hint.style.opacity = "1";
      scratchCount    = 0;
      hintHidden      = false;
      revealTriggered = false;

      drawScratchSurface();
    });
  </script>

</body>
</html>
