<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doggo Gallery</title>
  <style>
    @font-face { font-family: "LoveDays"; src: url("../fonts/LoveDays-2v7Oe.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family:"CutiePatootie"; src:url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype"); }
    @font-face { font-family:"Wildcrazy";     src:url("../fonts/Wildcrazy-WKYO.ttf")     format("truetype"); }
    @font-face { font-family:"Cookiemonster"; src:url("../fonts/Cookiemonster-gv11.ttf") format("truetype"); }

    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family: "LoveDays", sans-serif;
      background:linear-gradient(140deg,#fff7e8,#e9fff1);
      color:#2d1f0e;
      min-height:100vh;
      padding:24px 16px 90px;
    }
    header{ text-align:center; margin-bottom:18px; }
    h1{
      font-family:"CutiePatootie",cursive;
      font-size:clamp(2rem,6vw,3.2rem);
      color:#8a5a2e;
    }
    p{ margin-top:6px; opacity:0.8; }
    .gallery{
      width:min(1100px,92vw);
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:16px;
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:12px;
      box-shadow:0 12px 24px rgba(0,0,0,0.12);
      display:flex; flex-direction:column; gap:10px;
      align-items:center;
    }
    .frame{
      width:100%; height:180px;
      border-radius:12px;
      background:linear-gradient(135deg,#fff1d6,#e9ffe8);
      overflow:hidden;
    }
    .doggo-photo{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }
    .caption{
      font-family:"Cookiemonster",sans-serif;
      font-size:0.95rem;
      color:#6a3a2e;
    }
    .back-btn{
      position:fixed; left:20px; bottom:20px; z-index:30;
      border:none; border-radius:999px; padding:10px 20px;
      font-family:"CutiePatootie",cursive; font-size:1rem; cursor:pointer;
      background:#fff; color:#8a5a2e;
      box-shadow:0 8px 22px rgba(0,0,0,0.18);
      transition:transform 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 26px rgba(0,0,0,0.22); }
  
    body, body * {
      font-family: "LoveDays", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif !important;
    }
  </style>
  <script defer src="../js/site-runtime.js?v=20260331-runtime13"></script>
</head>
<body>
  <header>
    <h1>Doggo Gallery</h1>
    <p>A happy wall for your best doggo moments.</p>
  </header>

  <section class="gallery" id="doggoGallery"></section>

  <button class="back-btn" onclick="sessionStorage.setItem('cameBack','true'); location.href='index.html?v=20260331-runtime13';">Go Back</button>

  <script>
    const doggoCaptions = [
      "gimme money",
      "robbin in the hood",
      "i did not fart",
      "Puppy eyes attack",
      "Treat inspector",
      "Zoomies mode",
      "Park explorer",
      "Sunbeam snoozer",
      "cuteness alert",
      "Goodest smile",
      "Biscuit break",
      "Cozy loaf",
      "Sniff squad leader",
      "Tiny guardian",
      "Belly-rub CEO",
      "Side-eye artist",
      "Rainy paw patrol",
      "Blanket monster",
      "Nose boop expert",
      "Sofa conqueror",
      "Adventure paws",
      "Happy bark hour",
      "Love bug mode",
      "Ball detective",
      "Forever goodest"
    ];

    const doggoGallery = document.getElementById("doggoGallery");
    doggoGallery.innerHTML = doggoCaptions.map((caption, index) => `
      <article class="card">
        <div class="frame">
          <img
            class="doggo-photo"
            src="../image/doggo_gallery/D${index + 1}.jpg"
            alt="Doggo photo ${index + 1}"
            loading="lazy"
            decoding="async"
          />
        </div>
        <div class="caption">${caption}</div>
      </article>
    `).join("");
  </script>
</body>
</html>
