<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Would You Rather 💭</title>
  <style>
    @font-face { font-family: "CutiePatootie"; src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "Wildcrazy";     src: url("../fonts/Wildcrazy-WKYO.ttf")     format("truetype"); font-display: swap; }
    @font-face { font-family: "Cookiemonster"; src: url("../fonts/Cookiemonster-gv11.ttf") format("truetype"); font-display: swap; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #fff5fb;
      --bg-2:   #f0f8ff;
      --ink:    #2a2a3b;
      --a:      #ff6eb0;
      --b:      #6eaaff;
      --accent: #e2b7ff;
    }

    html, body, body * {
      font-family: "Wildcrazy", "Segoe UI Emoji", sans-serif !important;
    }

    body {
      color: var(--ink);
      background: linear-gradient(140deg, var(--bg), var(--bg-2));
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 80px;
    }

    .bg-sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .bg-sparkles span {
      position: absolute; width: var(--size); height: var(--size);
      border-radius: 999px; background: var(--accent);
      opacity: 0.3; filter: blur(0.5px);
      animation: floatS 10s ease-in-out infinite;
    }
    @keyframes floatS {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-14px) scale(1.06); }
    }

    header {
      text-align: center; flex-shrink: 0;
      margin-bottom: 12px;
      position: relative; z-index: 2;
    }
    header h1 {
      font-family: "CutiePatootie", cursive !important;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
    }
    header p { margin-top: 4px; font-size: clamp(0.95rem, 2.5vw, 1.2rem); opacity: 0.75; }

    /* counter */
    .counter {
      text-align: center; flex-shrink: 0;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      opacity: 0.6;
      margin-bottom: 8px;
      position: relative; z-index: 2;
    }

    /* ── QUESTION CARD ── */
    .card-wrap {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(14px, 2.5vh, 22px);
      position: relative; z-index: 2;
    }

    .question-label {
      font-family: "CutiePatootie", cursive !important;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      opacity: 0.7;
      letter-spacing: 0.05em;
    }

    .options {
      display: flex;
      gap: clamp(10px, 2.5vw, 20px);
      width: min(800px, 94vw);
      flex-wrap: wrap;
      justify-content: center;
    }

    .option-btn {
      flex: 1;
      min-width: min(280px, 88vw);
      border: none;
      border-radius: 22px;
      padding: clamp(18px,3vh,28px) clamp(16px,3vw,24px);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.5;
      cursor: pointer;
      text-align: center;
      color: #fff;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .option-btn.opt-a { background: linear-gradient(135deg, #ff6eb0, #ff3d8a); }
    .option-btn.opt-b { background: linear-gradient(135deg, #6eaaff, #3d7aff); }
    .option-btn:hover { transform: translateY(-5px) scale(1.03); box-shadow: 0 18px 40px rgba(0,0,0,0.2); }
    .option-btn:active { transform: scale(0.97); }
    .option-btn.chosen {
      transform: scale(1.06);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.6), 0 18px 40px rgba(0,0,0,0.2);
    }
    .option-btn.dimmed { opacity: 0.4; transform: scale(0.97); pointer-events: none; }

    .or-badge {
      font-family: "CutiePatootie", cursive !important;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: var(--ink);
      opacity: 0.5;
      flex-shrink: 0;
      align-self: center;
    }

    /* reaction */
    .reaction {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      text-align: center;
      color: var(--ink);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s, transform 0.4s cubic-bezier(0.22,1,0.36,1);
      min-height: 1.8em;
    }
    .reaction.show { opacity: 1; transform: translateY(0); }

    /* next btn */
    .next-btn {
      border: none; border-radius: 999px;
      padding: clamp(10px,2vh,14px) clamp(28px,6vw,48px);
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      cursor: pointer;
      background: linear-gradient(135deg, #e2b7ff, #c080ff);
      color: #2a2a3b;
      box-shadow: 0 10px 24px rgba(180,100,255,0.3);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      opacity: 0; pointer-events: none;
    }
    .next-btn.show { opacity: 1; pointer-events: all; }
    .next-btn:hover { transform: translateY(-3px) scale(1.05); }

    .back-btn {
      position: fixed; left: 20px; bottom: 20px; z-index: 30;
      border: none; border-radius: 999px; padding: 14px 28px;
      font-size: clamp(1.1rem,2.5vw,1.4rem); cursor: pointer;
      background: rgba(255,255,255,0.88); color: var(--ink);
      box-shadow: 0 8px 22px rgba(0,0,0,0.15);
      transition: transform 220ms ease;
    }
    .back-btn:hover { transform: translateY(-2px); }

    /* card flip transition */
    .card-wrap.flip-out { animation: flipOut 0.3s ease-in forwards; }
    .card-wrap.flip-in  { animation: flipIn  0.3s ease-out forwards; }
    @keyframes flipOut { to { opacity: 0; transform: scale(0.92) translateY(-12px); } }
    @keyframes flipIn  { from { opacity: 0; transform: scale(0.92) translateY(12px); } to { opacity:1; transform: none; } }
  </style>
</head>
<body>

  <div class="bg-sparkles" aria-hidden="true">
    <span style="--size:10px;left:8%;top:12%"></span>
    <span style="--size:16px;left:18%;top:24%"></span>
    <span style="--size:12px;left:32%;top:10%"></span>
    <span style="--size:14px;left:44%;top:22%"></span>
    <span style="--size:9px;left:56%;top:14%"></span>
    <span style="--size:13px;left:66%;top:30%"></span>
    <span style="--size:11px;left:78%;top:16%"></span>
    <span style="--size:15px;left:88%;top:28%"></span>
  </div>

  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">
    Go Back
  </button>

  <header>
    <h1>Would You Rather 💭</h1>
    <p>No wrong answers — just fun ones.</p>
  </header>

  <div class="counter" id="counter">Question 1 of 30</div>

  <div class="card-wrap" id="cardWrap">
    <div class="question-label">Would you rather...</div>
    <div class="options">
      <button class="option-btn opt-a" id="optA" onclick="choose('a')"></button>
      <div class="or-badge">OR</div>
      <button class="option-btn opt-b" id="optB" onclick="choose('b')"></button>
    </div>
    <div class="reaction" id="reaction"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next one 💭</button>
  </div>

  <script>
    const questions = [
      { a:"Have a cat that talks back 🐱", b:"Have a dog that reads your mind 🐶", ra:"That cat would definitely roast you nonstop 😂", rb:"Imagine — it just KNOWS. Scary cute." },
      { a:"Only eat dessert forever 🍰", b:"Never eat dessert again 🚫🍰", ra:"Life is literally just cake now. Incredible.", rb:"The self-control on you... respect." },
      { a:"Live in a treehouse 🌳", b:"Live in a cottage by the sea 🌊", ra:"Cozy elevated life. Squirrel neighbours included.", rb:"Waking up to waves every single day. Chef's kiss." },
      { a:"Always speak in rhymes 🎵", b:"Always sing what you want to say 🎶", ra:"Honestly? Iconic. Every conversation is a poem.", rb:"You'd basically be in a musical 24/7. Love it." },
      { a:"Rewind one memory to relive it 🔁", b:"Fast forward to see one future moment ⏩", ra:"Reliving the best days — goosebumps always.", rb:"Just a little peek. The suspense would kill me." },
      { a:"Know every language in the world 🌍", b:"Play every instrument perfectly 🎸", ra:"Talk to literally anyone anywhere. Superpower.", rb:"Show up anywhere and just... start performing." },
      { a:"Have a personal chef 🍽️", b:"Have a personal stylist 👗", ra:"Every meal is restaurant quality. No contest.", rb:"Always look amazing. Zero effort. Dream." },
      { a:"Spend a week in Tokyo 🗼", b:"Spend a week in Paris 🗺️", ra:"Anime. Street food. Vending machines everywhere.", rb:"The lights. The cafes. The absolute romance." },
      { a:"Read minds for one day 🧠", b:"Be invisible for one day 👻", ra:"You'd know every secret. Dangerous but tempting.", rb:"Imagine the places you could sneak into..." },
      { a:"Always smell amazing naturally 🌸", b:"Always have perfect hair naturally 💇", ra:"Everyone loves being around you. No effort needed.", rb:"Wake up with perfect hair every day. FREEDOM." },
      { a:"Have a movie night every Friday 🎬", b:"Have a fancy dinner every Saturday 🍷", ra:"Blankets. Popcorn. Comfort forever.", rb:"Dressed up, candles, music. Every week." },
      { a:"Be fluent in every coding language 💻", b:"Be fluent in every cooking style 🍜", ra:"Build anything you imagine. Limitless.", rb:"Every meal is a masterpiece. Everyone loves you." },
      { a:"Never feel tired ever 😤", b:"Never feel cold ever 🧊", ra:"Imagine what you'd get done. Absolutely unstoppable.", rb:"No more jacket struggles. Summer queen forever." },
      { a:"Have a wardrobe that refills itself 👚", b:"Have a fridge that refills itself 🥗", ra:"New outfits forever. Endless fashion era.", rb:"Never grocery shop again. Absolute chaos avoided." },
      { a:"Always have the best wifi 📶", b:"Always find a parking spot 🚗", ra:"No buffering. No waiting. Digital bliss.", rb:"Pulls up anywhere. Always the spot. Legend." },
      { a:"Have a pet penguin 🐧", b:"Have a pet red panda 🦊", ra:"Little tuxedo baby waddling around. I'm crying.", rb:"Fluffy. Cute. Ridiculous. Perfect." },
      { a:"Get paid to travel forever ✈️", b:"Get paid to eat forever 🍣", ra:"Every country. Every sunrise. Dream life.", rb:"Every restaurant. Every cuisine. Also dream life." },
      { a:"Live without social media 📵", b:"Live without music 🎵", ra:"Honestly kind of freeing? Maybe?", rb:"That's just not possible. No way." },
      { a:"Have a photographic memory 📸", b:"Never forget a face ever 👤", ra:"Remember everything you read. Superpower.", rb:"You'd recognise everyone. A bit surreal honestly." },
      { a:"Meet your favourite fictional character 📚", b:"Enter your favourite fictional world 🌀", ra:"One conversation with them. Life complete.", rb:"Live there for a week. Total immersion." },
      { a:"Have flowers always fresh at home 🌷", b:"Have candles that never burn out 🕯️", ra:"Every room smells like a garden. Gorgeous.", rb:"Cozy warm light. Always. Never running out." },
      { a:"Swim with dolphins 🐬", b:"Hold a baby panda 🐼", ra:"Pure magic in the ocean.", rb:"The softest thing you'll ever touch." },
      { a:"Always have the perfect comeback 💬", b:"Always have the perfect outfit 👑", ra:"Quick wit on demand. Nobody can touch you.", rb:"Walk in anywhere and OWN the room." },
      { a:"Write a bestselling novel 📖", b:"Direct a hit film 🎬", ra:"Your story in the world forever.", rb:"Your vision on screen. Incredible." },
      { a:"Have your dream home in the mountains 🏔️", b:"Have your dream home in the city 🌆", ra:"Peace. Nature. Stars at night. Perfection.", rb:"Everything close. Always something happening." },
      { a:"Be able to draw perfectly 🎨", b:"Be able to dance perfectly 💃", ra:"Create art that moves people. Beautiful gift.", rb:"Every song is yours. Every floor is your stage." },
      { a:"Always know what time it is ⏰", b:"Never be late for anything 🏃", ra:"Internal clock. Quietly impressive.", rb:"Always composed. Always there. Respect." },
      { a:"Get a surprise gift every morning 🎁", b:"Have no responsibilities for one week 🌴", ra:"Every day starts with joy. Adorable.", rb:"One whole week. Nothing. Just being. Heaven." },
      { a:"Have a hidden room in your home 🚪", b:"Have a rooftop garden 🌿", ra:"Secret space just for you. Magical.", rb:"Open air. Flowers. Sky. Above everything." },
      { a:"End every day knowing someone loves you 💖", b:"Start every day knowing good things are coming ☀️", ra:"That warmth at the end. Worth everything.", rb:"That hope at the start. Changes everything." },
    ];

    function shuffle(arr) {
      const a = [...arr];
      for (let i=a.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    let deck = shuffle(questions);
    let idx  = 0;
    let answered = false;

    function load() {
      answered = false;
      const q = deck[idx];
      document.getElementById("optA").textContent = q.a;
      document.getElementById("optB").textContent = q.b;
      document.getElementById("optA").classList.remove("chosen","dimmed");
      document.getElementById("optB").classList.remove("chosen","dimmed");
      document.getElementById("reaction").classList.remove("show");
      document.getElementById("reaction").textContent = "";
      document.getElementById("nextBtn").classList.remove("show");
      document.getElementById("counter").textContent = `Question ${idx+1} of ${deck.length}`;
    }

    function choose(side) {
      if (answered) return;
      answered = true;
      const q = deck[idx];
      const reaction = side === "a" ? q.ra : q.rb;

      document.getElementById("opt" + side.toUpperCase()).classList.add("chosen");
      document.getElementById("opt" + (side==="a"?"B":"A")).classList.add("dimmed");
      document.getElementById("reaction").textContent = reaction;

      setTimeout(()=>{
        document.getElementById("reaction").classList.add("show");
        if (idx < deck.length - 1) {
          document.getElementById("nextBtn").classList.add("show");
        } else {
          document.getElementById("nextBtn").textContent = "Start over 🔄";
          document.getElementById("nextBtn").classList.add("show");
        }
      }, 300);
    }

    function nextQuestion() {
      const wrap = document.getElementById("cardWrap");
      wrap.classList.add("flip-out");
      setTimeout(()=>{
        if (idx >= deck.length - 1) {
          deck = shuffle(questions);
          idx = 0;
        } else {
          idx++;
        }
        load();
        wrap.classList.remove("flip-out");
        wrap.classList.add("flip-in");
        setTimeout(()=> wrap.classList.remove("flip-in"), 320);
        document.getElementById("nextBtn").textContent = "Next one 💭";
      }, 300);
    }

    load();
  </script>
</body>
</html>
