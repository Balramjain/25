<head>

  <title>Would You Rather</title>
  <style>
    @font-face { font-family: "CutiePatootie"; src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype"); font-display: swap; }
    @font-face { font-family: "Wildcrazy"; src: url("../fonts/Wildcrazy-WKYO.ttf") format("truetype"); font-display: swap; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #2a1833;
      --bg-2: #14253b;
      --ink: #fff5fb;
      --soft: #e4cfe5;
      --accent-a: #ff77b7;
      --accent-b: #62a9ff;
      --accent-c: #ffe29d;
      --card: rgba(33, 22, 45, 0.82);
      --line: rgba(255, 255, 255, 0.12);
    }

    html, body {
      min-height: 100%;
    }

    body, body * {
      font-family: "Wildcrazy", "Segoe UI", sans-serif;
      font-weight: 700;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      padding: 22px 16px 90px;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 119, 183, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(98, 169, 255, 0.18), transparent 30%),
        linear-gradient(140deg, var(--bg), var(--bg-2));
    }

    .bg-sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-sparkles span {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      opacity: 0.18;
      animation: floatS 10s ease-in-out infinite;
    }

    @keyframes floatS {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-16px) scale(1.08); }
    }

    .shell,
    .back-btn {
      position: relative;
      z-index: 1;
    }

    .shell {
      width: min(940px, 100%);
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.7rem);
      line-height: 1.05;
    }

    header p {
      margin-top: 8px;
      color: var(--soft);
      font-size: clamp(0.96rem, 2.4vw, 1.15rem);
      line-height: 1.6;
    }

    .counter {
      text-align: center;
      color: var(--soft);
      margin-bottom: 12px;
      font-size: 1rem;
    }

    .card {
      border-radius: 30px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .question-label {
      text-align: center;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: var(--soft);
      margin-bottom: 18px;
    }

    .options {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .or-badge {
      align-self: center;
      justify-self: center;
      font-size: 1.4rem;
      color: var(--soft);
      opacity: 0.7;
    }

    .option-btn {
      min-height: 190px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 30px;
      padding: 26px 24px;
      color: #2f2a42;
      cursor: pointer;
      font-size: clamp(1rem, 2.4vw, 1.24rem);
      line-height: 1.5;
      text-align: center;
      box-shadow:
        0 18px 36px rgba(98, 122, 147, 0.14),
        0 8px 18px rgba(175, 125, 170, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
      transition:
        transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity 0.2s ease,
        box-shadow 0.2s ease,
        background-position 0.5s ease;
      background-size: 180% 180%;
    }

    .option-btn.opt-a {
      background: linear-gradient(150deg, rgba(255, 238, 244, 0.96), rgba(255, 248, 252, 0.96), rgba(248, 233, 244, 0.92));
    }

    .option-btn.opt-b {
      background: linear-gradient(150deg, rgba(233, 245, 255, 0.96), rgba(244, 251, 255, 0.96), rgba(227, 240, 252, 0.92));
    }

    .option-btn:hover {
      transform: translateY(-4px) scale(1.02);
      background-position: 100% 100%;
      box-shadow:
        0 28px 58px rgba(98, 122, 147, 0.2),
        0 10px 24px rgba(175, 125, 170, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
    }

    .option-btn.chosen {
      transform: scale(1.04);
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.75),
        0 28px 58px rgba(98, 122, 147, 0.24),
        0 10px 24px rgba(175, 125, 170, 0.16);
    }

    .option-btn.dimmed {
      opacity: 0.36;
      pointer-events: none;
    }

    .reaction {
      min-height: 70px;
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: clamp(1rem, 2.2vw, 1.14rem);
      line-height: 1.55;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .reaction.show {
      opacity: 1;
      transform: translateY(0);
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .next-btn {
      border: none;
      border-radius: 999px;
      padding: 14px 34px;
      cursor: pointer;
      font-size: 1.06rem;
      color: var(--ink);
      background: linear-gradient(135deg, #ffe29d, #ffc97d);
      box-shadow: 0 12px 24px rgba(255, 201, 125, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .next-btn.show {
      opacity: 1;
      pointer-events: auto;
    }

    .next-btn:hover {
      transform: translateY(-2px);
    }

    .back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 30;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      color: #2d2740;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14);
    }

    @media (max-width: 760px) {
      .options {
        grid-template-columns: 1fr;
      }

      .or-badge {
        padding: 2px 0;
      }

      .option-btn {
        min-height: 136px;
        text-align: center;
      }

      .card {
        padding: 18px;
      }
    }
  </style>

    const dateQuestions = [
      ["Get one long late-night terrace talk", "Get one long sunrise cuddle session", "Deep talk under soft sky is elite scene.", "Morning softness like this is unfairly nice."],
      ["Receive daily good morning voice notes", "Receive daily good night forehead kisses", "Starting day with that voice? Finished, happy only.", "Ending day like that is luxury, no?"],
      ["Go on one bookstore date", "Go on one arcade date", "Quiet romance and accidental hand touch scene.", "Loud fun, teasing, and total chaos chemistry."],

      ["Have one handwritten love letter", "Have one long voice message from the heart", "Paper keeps feelings alive, maga.", "Hearing the voice crack a little? Full impact."],
      ["Get one forehead kiss every day", "Get one hand squeeze every day", "Tiny action, huge effect.", "Simple, subtle, and full comfort."],
      ["Do one rainy walk together", "Do one blanket movie marathon together", "Slightly filmy, fully worth it.", "No outside world, only cozy-cozy."],
      ["Have one date at a quiet cafe", "Have one date on a noisy fairground", "Conversation-heavy and sweet.", "Full chaos, full joy, full memories."],
      ["Be teased all day by your person", "Be pampered all day by your person", "Annoying but also low-key addictive.", "Princess treatment accepted immediately."],
      ["Get one surprise road trip", "Get one surprise staycation", "New places and random snacks, full scene.", "No travel stress, only soft luxury."],
      ["Spend one day doing nothing together", "Spend one day doing ten random fun things together", "Comfort silence is also peak romance.", "Busy, silly, and super memorable."],
      ["Get complimented for your smile every day", "Get complimented for your brain every day", "Blush coming automatically.", "This one hits deeper, no?"],
      ["Have inside jokes nobody else gets", "Have secret hand signals only both of you know", "Private comedy club vibes.", "That silent communication scene is too cute."],
      ["Have one person who steals your fries", "Have one person who saves last bite for you", "Possessive love, little toxic, still funny.", "Saving last bite is actual devotion."],
      ["Get one long hug after bad day", "Get one long pep talk after bad day", "Sometimes hug only is needed boss.", "Correct words at correct time also powerful."],
      ["Go dancing where nobody knows you", "Go singing where nobody knows you", "Embarrassing for five minutes, memory for life.", "Off-key but full confidence, lovely scene."],
      ["Have one relationship full of banter", "Have one relationship full of mushy softness", "Roasting with love is beautiful art.", "Soft-soft affection all day is also dangerous."]
    ];

    const chaosQuestions = [
      ["Lose network in the middle of important call", "Lose charger when phone is at 2 percent", "This is office trauma type choice.", "Battery anxiety full activated, ayyo."],
      ["Get stuck in rain without umbrella", "Get stuck in sun without sunglasses", "At least filmy moment chance is there.", "You will look angry and stylish both."],
      ["Have laptop update during urgency", "Have Wi-Fi die during urgency", "That spinning wheel will test your soul.", "Whole family suddenly becomes internet engineer only."],
      ["Accidentally like one old photo", "Accidentally send one message then delete too late", "Social anxiety max pro version.", "Now you must change name and city."],
      ["Spill chai on white shirt before leaving", "Step in puddle with fresh shoes before leaving", "Day not started, already one issue.", "Shoe pain is very personal, boss."],
      ["Miss your stop on Metro", "Get into wrong auto and realize late", "Small detour, big irritation.", "Then whole route explanation scene starts."],
      ["Forget password for every app", "Forget names of everyone at one party", "Digital identity gone, what a life.", "Social buffering in real life, too much."],
      ["Have alarm not ring on Monday", "Have meeting moved earlier without warning", "Week opening itself like horror trailer.", "Calendar betrayal is worst betrayal."],
      ["Get one haircut you hate", "Get one outfit photo you hate", "Hair grows back but confidence takes time.", "Photo exists forever, little painful."],
      ["Drop your last fry", "Drop your last momo", "Tiny tragedy, big emotional damage.", "That last momo was future and hope."],
      ["Have one dramatic power cut during movie", "Have one dramatic buffering during climax", "Darkness at least gives suspense, no?", "Buffering at climax should be illegal actually."],

    const cuteQuestions = [

      ["Have one balcony chai ritual", "Have one late-night snack ritual", "Evenings become full romantic routine.", "Midnight hunger plus togetherness, elite."],
      ["Laugh till you cry together", "Cry once and get understood completely", "Pure joy scene, top tier.", "That depth is scary and beautiful both."],
      ["Get picked up after a long day", "Get waited for after a long day", "Rescue energy, full movie vibe.", "Someone waiting for you always hits different."],
      ["Have one person who knows your coffee order", "Have one person who knows your comfort meal", "Morning love language sorted.", "Bad day cure already handled."],
      ["Take silly mirror selfies together", "Take one unexpectedly perfect candid together", "Goofy memories are always gold.", "That one natural photo becomes favorite forever."],
      ["Get called first during good news", "Get called first during bad news", "Happiness sharing is full trust scene.", "Being safe place during hard time is real love."],
      ["Have one person who hypes every outfit", "Have one person who hypes every random thought", "Fashion confidence unlocked properly.", "Brain support is also super attractive, no?"],
      ["Have one rainy day nap together", "Have one sunny lazy brunch together", "Sleepy cozy romance, too good.", "Bright easy happiness, full wholesome."],
      ["Get one flower tucked behind ear", "Get one hoodie placed on shoulders", "Small filmy gesture, big effect.", "Immediate protection mode, very cute."],
      ["Share one earphone and walk", "Share one plate and eat", "Music syncing hearts, wow okay.", "One plate means closeness level confirmed."],
      ["Be loved loudly", "Be loved quietly but consistently", "Public hype and dramatic affection, fun scene.", "Steady everyday love is deadly powerful."],
      ["End every date with ice cream", "End every date with one extra-long hug", "Sweet finish and sticky fingers, nice.", "No sugar needed, heart already full."]
    ];

    const questions = [...cityQuestions, ...foodQuestions, ...dateQuestions, ...chaosQuestions, ...cuteQuestions]
      .map(([a, b, ra, rb]) => ({ a, b, ra, rb }));

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let deck = shuffle(questions);
    let idx = 0;
    let answered = false;

    function load() {
      answered = false;
      const q = deck[idx];
      document.getElementById("optA").textContent = q.a;
      document.getElementById("optB").textContent = q.b;
      document.getElementById("optA").classList.remove("chosen", "dimmed");
      document.getElementById("optB").classList.remove("chosen", "dimmed");
      document.getElementById("reaction").classList.remove("show");
      document.getElementById("reaction").textContent = "";
      document.getElementById("nextBtn").classList.remove("show");
      document.getElementById("counter").textContent = "Question " + (idx + 1) + " of " + deck.length;
    }

    function choose(side) {
      if (answered) return;
      answered = true;
      const q = deck[idx];
      const reaction = side === "a" ? q.ra : q.rb;
      document.getElementById("opt" + side.toUpperCase()).classList.add("chosen");
      document.getElementById("opt" + (side === "a" ? "B" : "A")).classList.add("dimmed");
      document.getElementById("reaction").textContent = reaction;
      setTimeout(() => {
        document.getElementById("reaction").classList.add("show");
        document.getElementById("nextBtn").classList.add("show");
        if (idx >= deck.length - 1) {
          document.getElementById("nextBtn").textContent = "Start over";
        } else {
          document.getElementById("nextBtn").textContent = "Next one";
        }
      }, 220);
    }

    function nextQuestion() {
      if (idx >= deck.length - 1) {
        deck = shuffle(questions);
        idx = 0;
      } else {
        idx += 1;
      }
      load();
    }

    load();
  </script>
